# 上市櫃公司徵人需求度設定檔

# 104 人力銀行搜尋關鍵字（用於全域搜尋職缺）
search_keywords:
  - "作業員"
  - "包裝員"
  - "產線作業員"
  - "技術員"
  - "品檢員"
  - "技術士"

# 職缺名稱二次過濾：職稱必須包含「員」字
# 例如：作業員、包裝員、檢驗員、倉管員、操作員等
# 排除邏輯：工程師、經理等管理/技術職稱不含「員」字，自然被排除
job_title_filter_char: "員"

# 排除的職缺名稱關鍵字（額外排除）
exclude_keywords:
  # 管理/非基層職稱
  - "主管"
  - "組長"
  - "課長"
  - "經理"
  - "副理"
  - "襄理"
  - "專員"
  - "業務員"
  - "研究員"
  # 非製造產線相關
  - "電商"
  - "網拍"
  - "理貨"
  - "撿貨"
  - "司機"
  - "門市"
  - "洗衣"
  - "洗滌"
  - "物流"
  - "職安"

# 104 API 設定
api:
  search_url: "https://www.104.com.tw/jobs/search/api/jobs"
  job_detail_url: "https://www.104.com.tw/job/ajax/content/"
  company_url: "https://www.104.com.tw/company/ajax/content/"
  delay_min: 1.0
  delay_max: 2.5
  detail_delay_min: 0.5
  detail_delay_max: 1.5
  max_retries: 3
  timeout: 30
  page_size: 20

# 路徑設定
paths:
  stock_codes_dir: "data/stock_codes"
  db_path: "stage3_web/investment.db"
  output_dir: "data"
