    - stage3_web/data/hiring_reports/latest_unlimited_hiring_revenue_media_receipt.json
    - stage3_web/data/hiring_reports/latest_unlimited_hiring_revenue_report_manifest.json

include_requires_manual_review:
  data_history:
    reason: >
      Historical daily CSV and report artifacts are useful for recovery and
      audit, but they increase repo size and may be better kept in SSD backup
      or release artifacts rather than Git history.
    examples:
      - data/YYYYMMDD_hiring_demand.csv
      - data/reports/**
      - data/revenue_snapshots/**
      - data/stock_monthly_revenue_raw/**
      - data/runs/**
  launchd_local_files:
    reason: >
      Scheduler plist files are source-like, but machine-specific paths may
      need templates before committing.
    examples:
      - com.hiring.demand.updater.plist
      - com.monthly.revenue.updater.plist
      - com.hiring.daily.artifacts.backup.plist

exclude_hard:
  secrets:
    - .env
    - .env.*
    - .env.txt
    - telegram_recipients.json
    - telegram_recipients.*.json
  protected_db:
    - stage3_web/investment.db
    - stage3_web/data/investment.db
    - stage3_web/fixed_assets.db
    - stage3_web/data/users.db
  local_runtime:
    - venv/**
    - __pycache__/**
    - "*/__pycache__/**"
    - "*.pyc"
    - "*.log"
    - logs/**
    - _local_runtime/**
    - Backup/**
    - .DS_Store
    - com.*.plist
    - stage3_web/__pycache__/**
    - stage3_web/instance/**
  local_runtime_pointers:
    - data/runs/latest_workflow_manifest.json
    - data/runs/latest_workflow_trace.jsonl
    - data/runs/latest_workflow_trace_receipt.json
    - data/reports/latest_unlimited_hiring_revenue_report_manifest.json

