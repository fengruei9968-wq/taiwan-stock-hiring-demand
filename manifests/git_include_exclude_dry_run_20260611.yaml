  stage3_web_investment_db: 117M
  data_reports: 92M
  backup: 31M
  data_stock_monthly_revenue_raw: 24M
  stage3_web_hiring_reports: 3.5M
  stage3_web_data_hiring_reports: 3.5M

observed_file_count_scan:
  total_files_seen: 8364
  hard_exclude_like_files: 6374
  include_candidate_like_files: 1388
  data_artifact_review_like_files: 601
  unclassified_examples:
    - stage3_web/.gitignore

pre_git_init_required_checks:
  - venv/bin/python3 -m unittest discover -s tests
  - venv/bin/python3 check_hiring_deploy_boundary.py --hiring-dir . --stage3-dir stage3_web --output-dir data/runs/deploy_boundary_check_pre_git_init
  - venv/bin/python3 check_release_readiness.py --root . --output-dir data/runs/release_readiness_pre_git_init

post_git_init_required_checks:
  - git status --short
  - git check-ignore -v .env telegram_recipients.json stage3_web/investment.db logs/fetch_monthly_revenue.log venv
  - git check-ignore -v stage3_web/app.py stage3_web/hiring_reports/latest_hiring_demand_web_data.json || true
  - venv/bin/python3 check_release_readiness.py --root . --output-dir data/runs/release_readiness_post_git_init

stop_conditions:
  - protected_db_appears_in_candidate_commit
  - secret_or_recipient_file_appears_in_candidate_commit
  - stage3_web_runtime_files_are_ignored_after_independent_git_init
  - daily_publish_candidate_includes_paths_outside_hiring_reports
  - release_readiness_checker_has_blockers
