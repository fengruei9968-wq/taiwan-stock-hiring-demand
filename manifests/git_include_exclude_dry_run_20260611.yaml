schema_version: hiring_git_include_exclude_dry_run_v1
generated_at: 2026-06-11
scope: dry_run_only_no_git_init_no_stage_no_commit_no_push
project_root: /Volumes/Extreme SSD/Python/台股子公司投資資訊擷取與展示/台股投資資訊系統_完整專案/上市櫃公司徵人需求度

plain_summary: >
  This manifest defines what should and should not enter a future independent
  GitHub repo for the hiring-demand project. It is not a git action. It does
  not authorize git init, git add, commit, push, Railway deploy, Telegram send,
  protected DB movement, or file deletion.

current_git_state:
  current_git_root: /Volumes/Extreme SSD/Python
  root_is_independent_repo: false
  warning: >
    The folder is still under the parent SSD Git worktree. Parent ignore rules
    currently hide stage3_web, so parent git status/check-ignore cannot be used
    as the final independent repo truth.

future_repo_recommendation:
  repo_root: /Volumes/Extreme SSD/Python/台股子公司投資資訊擷取與展示/台股投資資訊系統_完整專案/上市櫃公司徵人需求度
  railway_root_directory: stage3_web
  repo_strategy: one_topic_one_complete_repo
  daily_publish_strategy: json_artifacts_only_no_db_commit

